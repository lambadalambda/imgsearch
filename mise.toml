[tools]
go = "latest"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.sqlite-vector-setup]
description = "Download sqlite-vector extension for local platform"
run = "scripts/setup_sqlite_vector.sh"

[tasks.sqlite-vector-ready]
description = "Ensure sqlite-vector matches the local platform"
run = "scripts/ensure_sqlite_vector_ready.sh"

[tasks.sqlite-vector-test]
description = "Run sqlite-vector integration tests"
run = "RUN_SQLITE_VECTOR_INTEGRATION=1 SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" go test ./internal/vectorindex/sqlitevector -run SQLiteVector -v"

[tasks.serve]
description = "Run imgsearch with the native llama.cpp embedder"
run = "scripts/ensure_sqlite_vector_ready.sh; scripts/ensure_llama_cpp_native_build.sh; ort_lib=\"${PARAKEET_ONNXRUNTIME_LIB:-$(bash scripts/resolve_onnxruntime_lib.sh)}\"; bin=\"${TMPDIR:-/tmp}/imgsearch-mise-serve\"; go build -o \"$bin\" ./cmd/imgsearch && SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" \"$bin\" -vector-backend sqlite-vector -llama-native-model-path \"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" -llama-native-mmproj-path \"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" -llama-native-dimensions \"${LLAMA_NATIVE_DIMS:-4096}\" -llama-native-gpu-layers \"${LLAMA_NATIVE_GPU_LAYERS:-99}\" -llama-native-use-gpu=${LLAMA_NATIVE_USE_GPU:-true} -llama-native-context-size \"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" -llama-native-batch-size \"${LLAMA_NATIVE_BATCH_SIZE:-512}\" -llama-native-threads \"${LLAMA_NATIVE_THREADS:-0}\" -llama-native-image-max-side \"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" -llama-native-image-max-tokens \"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" -parakeet-onnxruntime-lib \"${ort_lib}\" -parakeet-onnx-coreml=${PARAKEET_ONNX_COREML:-0}"

[tasks."serve:8b"]
description = "Run imgsearch with the 8B native embedder"
run = "mise run serve"

[tasks."serve:api"]
description = "Run imgsearch HTTP server only"
run = "scripts/ensure_sqlite_vector_ready.sh; scripts/ensure_llama_cpp_native_build.sh; ort_lib=\"${PARAKEET_ONNXRUNTIME_LIB:-$(bash scripts/resolve_onnxruntime_lib.sh)}\"; bin=\"${TMPDIR:-/tmp}/imgsearch-mise-serve-api\"; go build -o \"$bin\" ./cmd/imgsearch && SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" \"$bin\" -mode api -enable-annotations=false -vector-backend sqlite-vector -llama-native-model-path \"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" -llama-native-mmproj-path \"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" -llama-native-dimensions \"${LLAMA_NATIVE_DIMS:-4096}\" -llama-native-gpu-layers \"${LLAMA_NATIVE_GPU_LAYERS:-99}\" -llama-native-use-gpu=${LLAMA_NATIVE_USE_GPU:-true} -llama-native-context-size \"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" -llama-native-batch-size \"${LLAMA_NATIVE_BATCH_SIZE:-512}\" -llama-native-threads \"${LLAMA_NATIVE_THREADS:-0}\" -llama-native-image-max-side \"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" -llama-native-image-max-tokens \"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" -parakeet-onnxruntime-lib \"${ort_lib}\" -parakeet-onnx-coreml=${PARAKEET_ONNX_COREML:-0}"

[tasks."serve:worker"]
description = "Run imgsearch worker only"
run = "scripts/ensure_sqlite_vector_ready.sh; scripts/ensure_llama_cpp_native_build.sh; ort_lib=\"${PARAKEET_ONNXRUNTIME_LIB:-$(bash scripts/resolve_onnxruntime_lib.sh)}\"; bin=\"${TMPDIR:-/tmp}/imgsearch-mise-serve-worker\"; go build -o \"$bin\" ./cmd/imgsearch && SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" \"$bin\" -mode worker -vector-backend sqlite-vector -llama-native-model-path \"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" -llama-native-mmproj-path \"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" -llama-native-dimensions \"${LLAMA_NATIVE_DIMS:-4096}\" -llama-native-gpu-layers \"${LLAMA_NATIVE_GPU_LAYERS:-99}\" -llama-native-use-gpu=${LLAMA_NATIVE_USE_GPU:-true} -llama-native-context-size \"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" -llama-native-batch-size \"${LLAMA_NATIVE_BATCH_SIZE:-512}\" -llama-native-threads \"${LLAMA_NATIVE_THREADS:-0}\" -llama-native-image-max-side \"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" -llama-native-image-max-tokens \"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" -parakeet-onnxruntime-lib \"${ort_lib}\" -parakeet-onnx-coreml=${PARAKEET_ONNX_COREML:-0}"

[tasks."serve:8b:annotator-26b"]
description = "Run imgsearch with the 8B native embedder and 26B Gemma annotator"
run = "scripts/ensure_sqlite_vector_ready.sh; scripts/ensure_llama_cpp_native_build.sh; ort_lib=\"${PARAKEET_ONNXRUNTIME_LIB:-$(bash scripts/resolve_onnxruntime_lib.sh)}\"; bin=\"${TMPDIR:-/tmp}/imgsearch-mise-serve-8b-annotator-26b\"; go build -o \"$bin\" ./cmd/imgsearch && SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" \"$bin\" -vector-backend sqlite-vector -llama-native-model-path \"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" -llama-native-mmproj-path \"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" -llama-native-dimensions \"${LLAMA_NATIVE_DIMS:-4096}\" -llama-native-gpu-layers \"${LLAMA_NATIVE_GPU_LAYERS:-99}\" -llama-native-use-gpu=${LLAMA_NATIVE_USE_GPU:-true} -llama-native-context-size \"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" -llama-native-batch-size \"${LLAMA_NATIVE_BATCH_SIZE:-512}\" -llama-native-threads \"${LLAMA_NATIVE_THREADS:-0}\" -llama-native-image-max-side \"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" -llama-native-image-max-tokens \"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" -llama-native-annotator-variant 26b -parakeet-onnxruntime-lib \"${ort_lib}\" -parakeet-onnx-coreml=${PARAKEET_ONNX_COREML:-0}"

[tasks."serve:smoke"]
description = "Smoke-test local server startup"
run = "scripts/smoke_serve.sh"

[tasks.llama-cpp-native-build]
description = "Build llama.cpp libs for native embedder"
run = "scripts/ensure_llama_cpp_native_build.sh"

[tasks.serve-llama-cpp-native]
description = "Run imgsearch with explicit native llama.cpp setup"
run = "mise run serve"

[tasks.llama-cpp-native-test]
description = "Run llama.cpp native semantic integration test"
run = "scripts/ensure_llama_cpp_native_build.sh; RUN_LLAMACPP_NATIVE_INTEGRATION=1 LLAMA_NATIVE_MODEL_PATH=\"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/Qwen3-VL-Embedding-2B-Q6_K.gguf}\" LLAMA_NATIVE_MMPROJ_PATH=\"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/mmproj-Qwen3-VL-Embedding-2B-f16.gguf}\" LLAMA_NATIVE_DIMS=\"${LLAMA_NATIVE_DIMS:-2048}\" LLAMA_NATIVE_GPU_LAYERS=\"${LLAMA_NATIVE_GPU_LAYERS:-99}\" LLAMA_NATIVE_USE_GPU=\"${LLAMA_NATIVE_USE_GPU:-true}\" LLAMA_NATIVE_CONTEXT_SIZE=\"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" LLAMA_NATIVE_BATCH_SIZE=\"${LLAMA_NATIVE_BATCH_SIZE:-512}\" LLAMA_NATIVE_THREADS=\"${LLAMA_NATIVE_THREADS:-0}\" LLAMA_NATIVE_IMAGE_MAX_SIDE=\"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" LLAMA_NATIVE_IMAGE_MAX_TOKENS=\"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" go test ./internal/embedder/llamacppnative -run NativeEmbeddingsAreSemanticallyReasonable -v"

[tasks.llama-cpp-native-test-fixtures]
description = "Evaluate fixture retrieval quality for llama.cpp native"
run = "scripts/ensure_llama_cpp_native_build.sh; RUN_LLAMACPP_NATIVE_INTEGRATION=1 LLAMA_NATIVE_MODEL_PATH=\"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/Qwen3-VL-Embedding-2B-Q6_K.gguf}\" LLAMA_NATIVE_MMPROJ_PATH=\"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/mmproj-Qwen3-VL-Embedding-2B-f16.gguf}\" LLAMA_NATIVE_DIMS=\"${LLAMA_NATIVE_DIMS:-2048}\" LLAMA_NATIVE_GPU_LAYERS=\"${LLAMA_NATIVE_GPU_LAYERS:-99}\" LLAMA_NATIVE_USE_GPU=\"${LLAMA_NATIVE_USE_GPU:-true}\" LLAMA_NATIVE_CONTEXT_SIZE=\"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" LLAMA_NATIVE_BATCH_SIZE=\"${LLAMA_NATIVE_BATCH_SIZE:-512}\" LLAMA_NATIVE_THREADS=\"${LLAMA_NATIVE_THREADS:-0}\" LLAMA_NATIVE_IMAGE_MAX_SIDE=\"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" LLAMA_NATIVE_IMAGE_MAX_TOKENS=\"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" go test ./internal/embedder/llamacppnative -run NativeFixtureRetrievalQuality -v"

[tasks.llama-cpp-native-bench]
description = "Benchmark llama.cpp native image embedding"
run = "scripts/ensure_llama_cpp_native_build.sh; RUN_LLAMACPP_NATIVE_INTEGRATION=1 LLAMA_NATIVE_MODEL_PATH=\"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/Qwen3-VL-Embedding-2B-Q6_K.gguf}\" LLAMA_NATIVE_MMPROJ_PATH=\"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/VesNFF/Qwen3-VL-Embedding-2B-GGUF/mmproj-Qwen3-VL-Embedding-2B-f16.gguf}\" LLAMA_NATIVE_DIMS=\"${LLAMA_NATIVE_DIMS:-2048}\" LLAMA_NATIVE_GPU_LAYERS=\"${LLAMA_NATIVE_GPU_LAYERS:-99}\" LLAMA_NATIVE_USE_GPU=\"${LLAMA_NATIVE_USE_GPU:-true}\" LLAMA_NATIVE_CONTEXT_SIZE=\"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" LLAMA_NATIVE_BATCH_SIZE=\"${LLAMA_NATIVE_BATCH_SIZE:-512}\" LLAMA_NATIVE_THREADS=\"${LLAMA_NATIVE_THREADS:-0}\" LLAMA_NATIVE_IMAGE_MAX_SIDE=\"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" LLAMA_NATIVE_IMAGE_MAX_TOKENS=\"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" go test ./internal/embedder/llamacppnative -run '^$' -bench BenchmarkNativeEmbedImage -benchtime=\"${BENCH_TIME:-3x}\" -count=\"${BENCH_COUNT:-3}\" -benchmem"

[tasks.llama-cpp-native-bench-qwen8b]
description = "Benchmark native embedder with Qwen 8B"
run = "scripts/ensure_llama_cpp_native_build.sh; RUN_LLAMACPP_NATIVE_INTEGRATION=1 LLAMA_NATIVE_MODEL_PATH=\"${LLAMA_NATIVE_MODEL_PATH:-$(pwd)/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" LLAMA_NATIVE_MMPROJ_PATH=\"${LLAMA_NATIVE_MMPROJ_PATH:-$(pwd)/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" LLAMA_NATIVE_DIMS=\"${LLAMA_NATIVE_DIMS:-4096}\" LLAMA_NATIVE_GPU_LAYERS=\"${LLAMA_NATIVE_GPU_LAYERS:-99}\" LLAMA_NATIVE_USE_GPU=\"${LLAMA_NATIVE_USE_GPU:-true}\" LLAMA_NATIVE_CONTEXT_SIZE=\"${LLAMA_NATIVE_CONTEXT_SIZE:-8192}\" LLAMA_NATIVE_BATCH_SIZE=\"${LLAMA_NATIVE_BATCH_SIZE:-512}\" LLAMA_NATIVE_THREADS=\"${LLAMA_NATIVE_THREADS:-0}\" LLAMA_NATIVE_IMAGE_MAX_SIDE=\"${LLAMA_NATIVE_IMAGE_MAX_SIDE:-384}\" LLAMA_NATIVE_IMAGE_MAX_TOKENS=\"${LLAMA_NATIVE_IMAGE_MAX_TOKENS:-0}\" go test ./internal/embedder/llamacppnative -run '^$' -bench BenchmarkNativeEmbedImage -benchtime=\"${BENCH_TIME:-3x}\" -count=\"${BENCH_COUNT:-3}\" -benchmem"

[tasks.llama-cpp-native-bench-gemma]
description = "Benchmark native Gemma image annotation"
run = "scripts/ensure_llama_cpp_native_build.sh; RUN_LLAMACPP_NATIVE_GEMMA_BENCH=1 LLAMA_NATIVE_GEMMA_MODEL_PATH=\"${LLAMA_NATIVE_GEMMA_MODEL_PATH:-$(pwd)/models/HauhauCS/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-Q4_K_P.gguf}\" LLAMA_NATIVE_GEMMA_MMPROJ_PATH=\"${LLAMA_NATIVE_GEMMA_MMPROJ_PATH:-$(pwd)/models/HauhauCS/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive/mmproj-Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-f16.gguf}\" LLAMA_NATIVE_GEMMA_GPU_LAYERS=\"${LLAMA_NATIVE_GEMMA_GPU_LAYERS:-99}\" LLAMA_NATIVE_GEMMA_USE_GPU=\"${LLAMA_NATIVE_GEMMA_USE_GPU:-true}\" LLAMA_NATIVE_GEMMA_CONTEXT_SIZE=\"${LLAMA_NATIVE_GEMMA_CONTEXT_SIZE:-8192}\" LLAMA_NATIVE_GEMMA_BATCH_SIZE=\"${LLAMA_NATIVE_GEMMA_BATCH_SIZE:-512}\" LLAMA_NATIVE_GEMMA_THREADS=\"${LLAMA_NATIVE_GEMMA_THREADS:-0}\" LLAMA_NATIVE_GEMMA_IMAGE_MAX_SIDE=\"${LLAMA_NATIVE_GEMMA_IMAGE_MAX_SIDE:-1024}\" LLAMA_NATIVE_GEMMA_IMAGE_MAX_TOKENS=\"${LLAMA_NATIVE_GEMMA_IMAGE_MAX_TOKENS:-0}\" go test ./internal/embedder/llamacppnative -run '^$' -bench BenchmarkNativeAnnotateImage -benchtime=\"${BENCH_TIME:-3x}\" -count=\"${BENCH_COUNT:-3}\" -benchmem"

[tasks.import-images]
description = "Bulk upload images and videos from a folder"
run = "scripts/import_images.sh"

[tasks.reset-db]
description = "Delete local SQLite database files"
run = "mkdir -p ./data && rm -f ./data/imgsearch.sqlite ./data/imgsearch.sqlite-journal ./data/imgsearch.sqlite-wal ./data/imgsearch.sqlite-shm"
