[tools]
go = "latest"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.jina-setup]
description = "Create venv and install sidecar deps"
run = "python3 -m venv .venv && .venv/bin/pip install mlx mlx-lm numpy huggingface_hub 'transformers==4.52.0' pillow requests torch peft torchvision"

[tasks.sqlite-vector-setup]
description = "Download sqlite-vector extension for local platform"
run = "scripts/setup_sqlite_vector.sh"

[tasks.sqlite-vector-test]
description = "Run sqlite-vector integration tests"
run = "RUN_SQLITE_VECTOR_INTEGRATION=1 SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" go test ./internal/vectorindex/sqlitevector -run SQLiteVector -v"

[tasks.serve]
description = "Ensure sqlite-vector exists and run imgsearch"
run = "if [ ! -f ./tools/sqlite-vector/vector ]; then scripts/setup_sqlite_vector.sh; fi; SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" go run ./cmd/imgsearch -vector-backend sqlite-vector"

[tasks.serve-torch]
description = "Ensure sqlite-vector exists and run imgsearch with jina-torch"
run = "if [ ! -f ./tools/sqlite-vector/vector ]; then scripts/setup_sqlite_vector.sh; fi; SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" go run ./cmd/imgsearch -embedder jina-torch -vector-backend sqlite-vector"

[tasks.sqlite-ai-build]
description = "Build sqlite-ai extension from sibling repo"
run = "make -C ../sqlite-ai extension"

[tasks.serve-sqlite-ai]
description = "Run imgsearch with in-DB sqlite-ai embedding"
run = "if [ ! -f ./tools/sqlite-vector/vector ]; then scripts/setup_sqlite_vector.sh; fi; if [ ! -f ../sqlite-ai/dist/ai ] && [ ! -f ../sqlite-ai/dist/ai.dylib ] && [ ! -f ../sqlite-ai/dist/ai.so ] && [ ! -f ../sqlite-ai/dist/ai.dll ]; then make -C ../sqlite-ai extension; fi; SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" SQLITE_AI_PATH=\"${SQLITE_AI_PATH:-$(pwd)/../sqlite-ai/dist/ai}\" go run ./cmd/imgsearch -embedder sqlite-ai -vector-backend sqlite-vector -sqlite-ai-model-path \"${SQLITE_AI_MODEL_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" -sqlite-ai-vision-model-path \"${SQLITE_AI_VISION_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" -sqlite-ai-dimensions \"${SQLITE_AI_DIMS:-4096}\" -sqlite-ai-model-version \"${SQLITE_AI_MODEL_VERSION:-Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\""

[tasks.sqlite-ai-test]
description = "Run sqlite-ai multimodal embedding integration test"
run = "RUN_SQLITE_AI_INTEGRATION=1 SQLITE_AI_PATH=\"${SQLITE_AI_PATH:-$(pwd)/../sqlite-ai/dist/ai}\" SQLITE_AI_MODEL_PATH=\"${SQLITE_AI_MODEL_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" SQLITE_AI_VISION_PATH=\"${SQLITE_AI_VISION_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" SQLITE_AI_DIMS=\"${SQLITE_AI_DIMS:-4096}\" go test ./internal/embedder/sqliteai -run SQLiteAIEmbeddingsAreSemanticallyReasonable -v"

[tasks.sqlite-ai-test-api]
description = "Run sqlite-ai API end-to-end integration test"
run = "RUN_SQLITE_AI_INTEGRATION=1 SQLITE_AI_PATH=\"${SQLITE_AI_PATH:-$(pwd)/../sqlite-ai/dist/ai}\" SQLITE_AI_MODEL_PATH=\"${SQLITE_AI_MODEL_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" SQLITE_AI_VISION_PATH=\"${SQLITE_AI_VISION_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" SQLITE_AI_DIMS=\"${SQLITE_AI_DIMS:-4096}\" go test ./internal/integration -run APIEndToEndWithSQLiteAIEmbedder -v"

[tasks.sqlite-ai-test-all]
description = "Run all sqlite-ai integration tests"
run = "RUN_SQLITE_AI_INTEGRATION=1 SQLITE_AI_PATH=\"${SQLITE_AI_PATH:-$(pwd)/../sqlite-ai/dist/ai}\" SQLITE_AI_MODEL_PATH=\"${SQLITE_AI_MODEL_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" SQLITE_AI_VISION_PATH=\"${SQLITE_AI_VISION_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" SQLITE_AI_DIMS=\"${SQLITE_AI_DIMS:-4096}\" go test ./internal/embedder/sqliteai -run SQLiteAIEmbeddingsAreSemanticallyReasonable -v && RUN_SQLITE_AI_INTEGRATION=1 SQLITE_AI_PATH=\"${SQLITE_AI_PATH:-$(pwd)/../sqlite-ai/dist/ai}\" SQLITE_AI_MODEL_PATH=\"${SQLITE_AI_MODEL_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/Qwen3-VL-Embedding-8B-Q4_K_M.gguf}\" SQLITE_AI_VISION_PATH=\"${SQLITE_AI_VISION_PATH:-$(pwd)/../sqlite-ai/tests/models/Qwen/mmproj-Qwen3-VL-Embedding-8B-f16.gguf}\" SQLITE_AI_DIMS=\"${SQLITE_AI_DIMS:-4096}\" go test ./internal/integration -run APIEndToEndWithSQLiteAIEmbedder -v"

[tasks.import-images]
description = "Bulk upload images from a folder"
run = "scripts/import_images.sh"

[tasks.reset-db]
description = "Delete local SQLite database files"
run = "mkdir -p ./data && rm -f ./data/imgsearch.sqlite ./data/imgsearch.sqlite-journal ./data/imgsearch.sqlite-wal ./data/imgsearch.sqlite-shm"

[tasks.jina-serve]
description = "Run local Jina MLX embedding server"
run = "sh -c '.venv/bin/python scripts/jina_mlx_server.py --host 127.0.0.1 --port 9009 --allow-dir ./data/images --max-image-pixels \"${JINA_MLX_MAX_IMAGE_PIXELS:-3145728}\"; code=$?; if [ \"$code\" -eq 130 ] || [ \"$code\" -eq 143 ]; then exit 0; fi; exit \"$code\"'"

[tasks.jina-torch-serve]
description = "Run local Jina Torch embedding server"
run = "sh -c '.venv/bin/python scripts/jina_torch_server.py --host 127.0.0.1 --port 9009 --allow-dir ./data/images --device \"${JINA_TORCH_DEVICE:-auto}\" --max-image-pixels \"${JINA_TORCH_MAX_IMAGE_PIXELS:-602112}\"; code=$?; if [ \"$code\" -eq 130 ] || [ \"$code\" -eq 143 ]; then exit 0; fi; exit \"$code\"'"

[tasks.qwen3-setup]
description = "Create venv and install Qwen3 sidecar deps"
run = "python3 -m venv .venv-qwen3 && .venv-qwen3/bin/pip install --upgrade pip && .venv-qwen3/bin/pip install --extra-index-url https://download.pytorch.org/whl/cu128 'torch>=2.8,<2.9' torchvision && .venv-qwen3/bin/pip install accelerate qwen-vl-utils pillow requests 'transformers>=4.57.3,<5'"

[tasks.qwen3-serve]
description = "Run local Qwen3-VL-Embedding-8B sidecar"
run = "sh -c '.venv-qwen3/bin/python scripts/qwen3_vl_server.py --host 127.0.0.1 --port 9010 --repo-path \"${QWEN3_VL_REPO_PATH:?set QWEN3_VL_REPO_PATH to cloned Qwen3-VL-Embedding repo}\" --allow-dir ./data/images --model-id \"${QWEN3_VL_MODEL_ID:-Qwen/Qwen3-VL-Embedding-8B}\" --attn-implementation \"${QWEN3_VL_ATTN_IMPL:-sdpa}\" --torch-dtype \"${QWEN3_VL_TORCH_DTYPE:-auto}\" --max-image-pixels \"${QWEN3_VL_MAX_IMAGE_PIXELS:-1843200}\"; code=$?; if [ \"$code\" -eq 130 ] || [ \"$code\" -eq 143 ]; then exit 0; fi; exit \"$code\"'"

[tasks.serve-qwen-remote]
description = "Run imgsearch against remote Qwen3 sidecar"
run = "if [ ! -f ./tools/sqlite-vector/vector ]; then scripts/setup_sqlite_vector.sh; fi; SQLITE_VECTOR_PATH=\"$(pwd)/tools/sqlite-vector/vector\" go run ./cmd/imgsearch -embedder qwen3-vl-embedding-8b -jina-mlx-url \"${QWEN3_VL_URL:-http://127.0.0.1:9010}\" -embed-image-mode auto -vector-backend sqlite-vector"

[tasks.qwen3-test]
description = "Run sidecar semantic integration test against Qwen3"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=\"${QWEN3_VL_URL:-http://127.0.0.1:9010}\" go test ./internal/embedder/jinamlx -run SidecarEmbeddingsAreSemanticallyReasonable -v"

[tasks.qwen3-test-api]
description = "Run API sidecar integration test against Qwen3"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=\"${QWEN3_VL_URL:-http://127.0.0.1:9010}\" JINA_MLX_MODEL_NAME=Qwen3-VL-Embedding-8B JINA_MLX_MODEL_VERSION=transformers JINA_MLX_MODEL_DIMS=4096 go test ./internal/integration -run APIEndToEndWithJinaSidecar -v"

[tasks.qwen3-test-all]
description = "Run all integration tests against Qwen3 sidecar"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=\"${QWEN3_VL_URL:-http://127.0.0.1:9010}\" go test ./internal/embedder/jinamlx -run Sidecar -v && RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=\"${QWEN3_VL_URL:-http://127.0.0.1:9010}\" JINA_MLX_MODEL_NAME=Qwen3-VL-Embedding-8B JINA_MLX_MODEL_VERSION=transformers JINA_MLX_MODEL_DIMS=4096 go test ./internal/integration -run APIEndToEndWithJinaSidecar -v"

[tasks.jina-test]
description = "Run embedder sidecar similarity integration test"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=http://127.0.0.1:9009 go test ./internal/embedder/jinamlx -run Sidecar -v"

[tasks.jina-test-api]
description = "Run API end-to-end sidecar integration test"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=http://127.0.0.1:9009 go test ./internal/integration -run APIEndToEndWithJinaSidecar -v"

[tasks.jina-test-all]
description = "Run all Jina sidecar integration tests"
run = "RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=http://127.0.0.1:9009 go test ./internal/embedder/jinamlx -run Sidecar -v && RUN_JINA_MLX_INTEGRATION=1 JINA_MLX_URL=http://127.0.0.1:9009 go test ./internal/integration -run APIEndToEndWithJinaSidecar -v"
