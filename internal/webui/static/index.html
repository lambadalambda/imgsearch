<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imgsearch</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="/assets/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Local-First Retrieval Playground</p>
        <h1>imgsearch</h1>
        <p class="lede">
          Upload images, watch indexing status, then run text and similar-image search from one page.
        </p>
        <p id="live-connection" class="connection-badge" data-state="connecting" role="status" aria-live="polite">
          <span class="connection-dot" aria-hidden="true"></span>
          <span id="live-connection-label">Connecting live updates...</span>
        </p>
      </header>

      <section class="panel" aria-labelledby="indexing-title">
        <div class="panel-head">
          <h2 id="indexing-title">Indexing Status</h2>
          <div class="panel-actions">
            <button id="retry-failed" type="button" class="ghost">Retry Failed / Queue Missing</button>
            <button id="refresh-stats" type="button" class="ghost">Refresh Status</button>
          </div>
        </div>
        <p id="stats-summary" class="status" role="status" aria-live="polite"></p>
        <div class="progress-track" aria-hidden="true">
          <div id="stats-progress" class="progress-fill"></div>
        </div>
        <p id="stats-detail" class="status"></p>
        <div id="stats-failures" class="failure-list"></div>
      </section>

      <section class="panel" aria-labelledby="upload-title">
        <div class="panel-head">
          <h2 id="upload-title">Upload</h2>
          <button id="refresh-images" type="button" class="ghost">Refresh Gallery</button>
        </div>
        <form id="upload-form" class="row">
          <label class="file-input">
            <span>Select image (JPEG/PNG/WEBP/AVIF)</span>
            <input id="upload-file" type="file" name="file" accept="image/png,image/jpeg,image/webp,image/avif" required />
          </label>
          <button type="submit" class="cta">Upload</button>
        </form>
        <p id="upload-status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="panel" aria-labelledby="search-title">
        <div class="panel-head">
          <h2 id="search-title">Search</h2>
          <button id="clear-results" type="button" class="ghost">Clear Results</button>
        </div>
        <form id="text-search-form" class="row">
          <input
            id="text-query"
            type="search"
            placeholder="Try: dog on grass, woman portrait, cat"
            autocomplete="off"
            required
          />
          <input
            id="negative-query"
            type="search"
            placeholder="Exclude (optional): cartoon, drawing, text"
            autocomplete="off"
          />
          <button type="submit" class="cta">Search Text</button>
        </form>
        <p id="search-status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="panel" aria-labelledby="results-title">
        <h2 id="results-title">Search Results</h2>
        <div id="results-grid" class="grid"></div>
      </section>

      <section class="panel" aria-labelledby="gallery-title">
        <h2 id="gallery-title">Gallery</h2>
        <div id="gallery-grid" class="grid"></div>
      </section>
    </main>

    <div id="image-lightbox" class="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-caption" hidden>
      <button id="lightbox-close" type="button" class="lightbox-close" aria-label="Close image preview">Close</button>
      <figure class="lightbox-figure">
        <img id="lightbox-image" alt="" />
        <figcaption id="lightbox-caption"></figcaption>
      </figure>
    </div>
    <div id="live-announcer" class="sr-only" role="status" aria-live="polite"></div>
  </body>
</html>
