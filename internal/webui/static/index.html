<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imgsearch</title>
    <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
    <script src="/assets/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div class="brand-row">
          <h1>imgsearch</h1>
        </div>

        <form id="text-search-form" class="search-bar">
          <label class="field field-primary">
            <span class="sr-only">Search</span>
            <input
              id="text-query"
              type="search"
              placeholder="cute cosplay, dog on grass, woman portrait"
              autocomplete="off"
              required
            />
          </label>
          <details class="search-advanced">
            <summary class="search-advanced-toggle">Exclude</summary>
            <div class="search-advanced-panel">
              <label class="field field-secondary">
                <span class="field-label">Exclude</span>
                <input
                  id="negative-query"
                  type="search"
                  placeholder="text, meme caption, cartoon"
                  autocomplete="off"
                />
              </label>
              <div class="field field-secondary search-tag-filter">
                <span class="field-label">Restrict by tags</span>
                <div id="search-tag-chips" class="search-tag-chips"></div>
                <input
                  id="search-tag-input"
                  class="search-tag-input"
                  type="search"
                  placeholder="type tag + Enter"
                  autocomplete="off"
                  aria-label="Add tag filter"
                />
                <div id="search-tag-suggestions" class="search-tag-suggestions" role="listbox" aria-label="Tag suggestions"></div>
                <label class="search-tag-mode-label" for="search-tag-mode">Match mode</label>
                <select id="search-tag-mode" class="search-tag-mode" aria-label="Tag match mode">
                  <option value="all">All tags</option>
                  <option value="any">Any tag</option>
                </select>
              </div>
            </div>
          </details>
          <div class="search-actions">
            <button type="submit" class="cta">Search</button>
            <button id="upload-open" type="button" class="ghost quiet-action">Upload</button>
          </div>
        </form>
      </header>

      <section id="ops-bar" class="ops-bar" aria-label="Library indexing status" data-state="idle">
        <div class="ops-inline">
          <p id="live-connection" class="connection-badge" data-state="connecting" role="status" aria-live="polite">
            <span class="connection-dot" aria-hidden="true"></span>
            <span id="live-connection-label">Connecting live updates...</span>
          </p>
          <p id="search-status" class="status search-status" role="status" aria-live="polite"></p>
          <p id="stats-summary" class="status summary-status" role="status" aria-live="polite"></p>
          <p id="stats-detail" class="status detail-status"></p>
          <details class="ops-menu">
            <summary class="ghost quiet-action ops-menu-trigger">
              <span aria-hidden="true">...</span>
              <span class="sr-only">More library actions</span>
            </summary>
            <div class="ops-menu-body">
              <div class="status-actions">
                <button id="retry-failed" type="button" class="ghost quiet-action">Retry stuck</button>
                <button id="refresh-stats" type="button" class="ghost quiet-action">Refresh</button>
              </div>
              <div id="stats-failures" class="failure-list failure-list-compact"></div>
            </div>
          </details>
        </div>
        <div class="progress-track progress-track-compact" aria-hidden="true">
          <div id="stats-progress" class="progress-fill"></div>
        </div>
      </section>

      <section class="workspace panel" aria-labelledby="library-view-title">
        <div class="workspace-head">
          <div>
            <p class="section-label">Browse</p>
            <h2 id="library-view-title">Library view</h2>
          </div>
          <div class="workspace-tools">
            <button id="refresh-images" type="button" class="ghost">Refresh</button>
            <button id="clear-results" type="button" class="ghost">Clear Results</button>
          </div>
        </div>

        <div class="tablist" role="tablist" aria-label="Library views">
          <button id="tab-gallery" type="button" class="tab-button" role="tab" aria-selected="true" aria-controls="gallery-panel">
            <span>Images</span>
            <span id="tab-gallery-count" class="tab-count">0</span>
          </button>
          <button id="tab-videos" type="button" class="tab-button" role="tab" aria-selected="false" aria-controls="videos-panel">
            <span>Videos</span>
            <span id="tab-videos-count" class="tab-count">0</span>
          </button>
          <button id="tab-tags" type="button" class="tab-button" role="tab" aria-selected="false" aria-controls="tags-panel">
            <span>Tags</span>
          </button>
          <button id="tab-results" type="button" class="tab-button" role="tab" aria-selected="false" aria-controls="results-panel">
            <span>Search Results</span>
            <span id="tab-results-count" class="tab-count">0</span>
          </button>
        </div>

        <section id="gallery-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-gallery">
          <div class="panel-toolbar gallery-toolbar">
            <div>
              <p id="gallery-status" class="status toolbar-status" role="status" aria-live="polite"></p>
            </div>
            <div class="pagination-controls" aria-label="Gallery pagination">
              <button id="gallery-prev" type="button" class="ghost">Newer</button>
              <p id="gallery-page-label" class="pagination-label">Page 1</p>
              <button id="gallery-next" type="button" class="ghost">Older</button>
            </div>
          </div>
          <div id="gallery-grid" class="grid gallery-grid"></div>
        </section>

        <section id="videos-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-videos" hidden>
          <div class="panel-toolbar gallery-toolbar">
            <div>
              <p id="videos-status" class="status toolbar-status" role="status" aria-live="polite"></p>
            </div>
            <div class="pagination-controls" aria-label="Video pagination">
              <button id="videos-prev" type="button" class="ghost">Newer</button>
              <p id="videos-page-label" class="pagination-label">Page 1</p>
              <button id="videos-next" type="button" class="ghost">Older</button>
            </div>
          </div>
          <div id="videos-grid" class="grid videos-grid"></div>
        </section>

        <section id="tags-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-tags" hidden>
          <div class="panel-toolbar">
            <p id="tags-status" class="status toolbar-status" role="status" aria-live="polite"></p>
          </div>
          <div id="tag-cloud" class="tag-cloud-list" role="list" aria-label="Top library tags"></div>
        </section>

        <section id="results-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-results" hidden>
          <div class="panel-toolbar results-toolbar">
            <p class="status toolbar-status">Latest text, tag, or similar-image search results stay here until you clear them.</p>
            <div class="pagination-controls results-pagination" aria-label="Result pagination">
              <button id="results-prev" type="button" class="ghost">Newer</button>
              <p id="results-page-label" class="pagination-label">Page 1</p>
              <button id="results-next" type="button" class="ghost">Older</button>
            </div>
          </div>
          <div id="results-grid" class="grid results-grid"></div>
        </section>
      </section>
    </main>

    <div id="upload-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="upload-title" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <p class="section-label">Import</p>
            <h2 id="upload-title">Add media</h2>
          </div>
          <button id="upload-close" type="button" class="ghost" aria-label="Close upload dialog">Close</button>
        </div>
        <form id="upload-form" class="upload-form">
          <label class="file-input">
            <span>Select one or more images or videos (JPEG/PNG/WEBP/AVIF/MP4/MOV/WEBM/MKV)</span>
            <input id="upload-file" type="file" name="file" accept="image/png,image/jpeg,image/webp,image/avif,video/mp4,video/quicktime,video/webm,video/x-matroska,.mp4,.mov,.webm,.mkv" multiple required />
          </label>
          <div class="modal-actions">
            <button type="submit" class="cta">Upload</button>
          </div>
        </form>
        <p id="upload-status" class="status" role="status" aria-live="polite"></p>
      </div>
    </div>

    <div id="image-lightbox" class="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-caption" hidden>
      <button id="lightbox-close" type="button" class="lightbox-close" aria-label="Close image preview">Close</button>
      <figure class="lightbox-figure">
        <img id="lightbox-image" alt="" />
        <figcaption id="lightbox-caption"></figcaption>
      </figure>
    </div>

    <div id="video-modal" class="lightbox video-modal" role="dialog" aria-modal="true" aria-labelledby="video-caption" hidden>
      <button id="video-close" type="button" class="lightbox-close" aria-label="Close video player">Close</button>
      <div class="video-modal-card">
        <video id="video-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
        <p id="video-caption" class="video-caption"></p>
      </div>
    </div>

    <div id="live-announcer" class="sr-only" role="status" aria-live="polite"></div>
  </body>
</html>
