name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl ffmpeg meson ninja-build pkg-config \
            libexpat1-dev libglib2.0-dev libheif-dev libimagequant-dev libjpeg-dev libpng-dev libwebp-dev

      - name: Install Linux libvips 8.18
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/libvips/libvips/releases/download/v8.18.0/vips-8.18.0.tar.xz -o /tmp/vips-8.18.0.tar.xz
          tar -xf /tmp/vips-8.18.0.tar.xz -C /tmp
          meson setup /tmp/vips-8.18.0/build /tmp/vips-8.18.0 \
            --buildtype=release \
            --prefix=/usr/local \
            -Dintrospection=disabled \
            -Dmodules=disabled
          meson compile -C /tmp/vips-8.18.0/build
          sudo meson install -C /tmp/vips-8.18.0/build
          sudo ldconfig

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg vips

      - name: Build llama.cpp runtime libraries
        run: |
          scripts/ensure_llama_cpp_native_build.sh

      - name: Run test suite
        run: |
          go test ./...
